<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lila Subset Guest Board</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main>
      <h1>Lila Subset Guest Board</h1>
      <div class="toolbar">
        <button id="play">Play</button>
        <p id="status">Press Play to start.</p>
      </div>

      <section id="meta" class="meta"></section>

      <table id="board" class="board"></table>

      <div class="move-box">
        <label>From <input id="from" maxlength="2" placeholder="e2" /></label>
        <label>To <input id="to" maxlength="2" placeholder="e4" /></label>
        <button id="move">Move</button>
      </div>
    </main>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
